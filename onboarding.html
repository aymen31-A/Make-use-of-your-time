<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Make use of your time - التسجيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .onboarding-card {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .lang-bar {
            display: flex;
            justify-content: flex-end;
            padding: 16px 24px;
            background: rgba(108, 92, 231, 0.1);
            gap: 12px;
        }

        .lang-btn {
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.2s;
            color: #6C5CE7;
        }

        .lang-btn.active {
            background: #6C5CE7;
            color: white;
            box-shadow: 0 2px 8px rgba(108, 92, 231, 0.3);
        }

        .form-content {
            padding: 24px 28px 40px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-area h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #6C5CE7, #a29bfe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 900;
        }

        .logo-area p {
            color: #6C5CE7;
            font-weight: 600;
            margin-top: 6px;
            font-size: 14px;
        }

        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
        }

        .avatar-preview {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(145deg, #e0d7ff, #cbbff5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            cursor: pointer;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s;
        }

        .avatar-preview:active {
            transform: scale(0.96);
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            font-size: 52px;
            color: #6C5CE7;
        }

        .avatar-actions {
            display: flex;
            gap: 16px;
            margin-top: 6px;
        }

        .avatar-btn {
            background: #f0f0f8;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-family: 'Cairo', sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: #6C5CE7;
            cursor: pointer;
            transition: 0.2s;
        }

        .avatar-btn:active {
            background: #ddd;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: #2D3436;
            font-size: 14px;
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e9eef3;
            border-radius: 28px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            background: white;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: #6C5CE7;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.2);
        }

        .goals-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .goal-card {
            background: #f8f9ff;
            border-radius: 24px;
            padding: 14px 6px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .goal-card.selected {
            background: #6C5CE7;
            color: white;
            border-color: #ffffff80;
            box-shadow: 0 6px 14px rgba(108, 92, 231, 0.3);
        }

        .goal-emoji {
            font-size: 22px;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(95deg, #6C5CE7, #8f7ef7);
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 800;
            color: white;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            margin-top: 24px;
            transition: 0.2s;
            box-shadow: 0 6px 18px rgba(108, 92, 231, 0.4);
        }

        .submit-btn:active {
            transform: scale(0.97);
        }

        .welcome-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e272e;
            backdrop-filter: blur(12px);
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 18px;
            z-index: 2000;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            animation: fadeUp 0.4s ease forwards;
            text-align: center;
            white-space: nowrap;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="onboarding-card" id="onboardingCard">
        <div class="lang-bar">
            <button class="lang-btn active" data-lang="ar">🇸🇦 العربية</button>
            <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        </div>
        <div class="form-content">
            <div class="logo-area">
                <h1 id="brandName">استغل وقتك</h1>
                <p id="brandSub">Make Use of Your Time</p>
            </div>

            <div class="avatar-section">
                <div class="avatar-preview" id="avatarPreview">
                    <div class="avatar-placeholder" id="avatarPlaceholder">📸</div>
                    <img id="avatarImg" style="display:none; width:100%; height:100%;" alt="profile">
                </div>
                <div class="avatar-actions">
                    <button class="avatar-btn" id="uploadBtn">📁 رفع صورة</button>
                    <button class="avatar-btn" id="urlBtn">🔗 رابط الصورة</button>
                </div>
            </div>

            <div class="input-group">
                <label id="nameLabel">الاسم الكامل</label>
                <input type="text" id="fullNameInput" class="input-field" placeholder="أدخل اسمك ..." autocomplete="off">
            </div>

            <div class="input-group">
                <label id="ageLabel">العمر</label>
                <input type="number" id="ageInput" class="input-field" placeholder="مثال: 25" min="1" max="120">
            </div>

            <div class="input-group">
                <label id="goalsLabel">ما الذي تريد استغلال وقتك فيه؟</label>
                <div class="goals-grid" id="goalsGrid"></div>
            </div>

            <button class="submit-btn" id="submitBtn">✨ ابدأ رحلتي ✨</button>
        </div>
    </div>

    <script>
        const langData = {
            ar: {
                upload: "📁 رفع صورة",
                urlLabel: "🔗 رابط الصورة",
                nameLabel: "الاسم الكامل",
                namePlaceholder: "أدخل اسمك ...",
                ageLabel: "العمر",
                agePlaceholder: "مثال: 25",
                goalsLabel: "ما الذي تريد استغلال وقتك فيه؟",
                startBtn: "✨ ابدأ رحلتي ✨",
                goalsList: [
                    { emoji: "📚", text: "دراسة" },
                    { emoji: "🏃", text: "رياضة" },
                    { emoji: "⏰", text: "تنظيم الوقت" },
                    { emoji: "🧘", text: "تطوير ذات" },
                    { emoji: "💼", text: "عمل وإنتاجية" },
                    { emoji: "🎨", text: "إبداع" }
                ],
                welcomeMsg: "مرحباً بك يا {{name}}! 🎉",
                selectGoalHint: "يرجى اختيار هدف واحد على الأقل",
                brandName: "استغل وقتك",
                brandSub: "Make Use of Your Time"
            },
            en: {
                upload: "📁 Upload Photo",
                urlLabel: "🔗 Image URL",
                nameLabel: "Full Name",
                namePlaceholder: "Enter your name...",
                ageLabel: "Age",
                agePlaceholder: "e.g., 25",
                goalsLabel: "What do you want to make use of your time for?",
                startBtn: "✨ Start My Journey ✨",
                goalsList: [
                    { emoji: "📚", text: "Study" },
                    { emoji: "🏃", text: "Sports" },
                    { emoji: "⏰", text: "Time Management" },
                    { emoji: "🧘", text: "Self Growth" },
                    { emoji: "💼", text: "Work & Productivity" },
                    { emoji: "🎨", text: "Creativity" }
                ],
                welcomeMsg: "Welcome, {{name}}! 🚀",
                selectGoalHint: "Please select at least one goal",
                brandName: "Make Use of Your Time",
                brandSub: "استغل وقتك"
            }
        };

        let currentLang = "ar";
        let selectedGoals = [];
        let profileImageData = null;

        const avatarImg = document.getElementById("avatarImg");
        const avatarPlaceholderDiv = document.getElementById("avatarPlaceholder");
        const fullNameInput = document.getElementById("fullNameInput");
        const ageInput = document.getElementById("ageInput");
        const goalsGrid = document.getElementById("goalsGrid");
        const submitBtn = document.getElementById("submitBtn");
        const brandName = document.getElementById("brandName");
        const brandSub = document.getElementById("brandSub");

        function applyLanguage() {
            const dict = langData[currentLang];
            document.getElementById("uploadBtn").innerHTML = dict.upload;
            document.getElementById("urlBtn").innerHTML = dict.urlLabel;
            document.getElementById("nameLabel").innerHTML = dict.nameLabel;
            document.getElementById("ageLabel").innerHTML = dict.ageLabel;
            document.getElementById("goalsLabel").innerHTML = dict.goalsLabel;
            submitBtn.innerHTML = dict.startBtn;
            fullNameInput.placeholder = dict.namePlaceholder;
            ageInput.placeholder = dict.agePlaceholder;
            brandName.innerText = dict.brandName;
            brandSub.innerText = dict.brandSub;

            if (currentLang === "ar") {
                document.body.setAttribute("dir", "rtl");
            } else {
                document.body.setAttribute("dir", "ltr");
            }

            renderGoalsGrid();
        }

        function renderGoalsGrid() {
            const goalsArray = langData[currentLang].goalsList;
            goalsGrid.innerHTML = "";
            goalsArray.forEach(goal => {
                const goalDiv = document.createElement("div");
                goalDiv.className = "goal-card";
                if (selectedGoals.includes(goal.text)) goalDiv.classList.add("selected");
                goalDiv.innerHTML = `<span class="goal-emoji">${goal.emoji}</span> <span>${goal.text}</span>`;
                goalDiv.addEventListener("click", () => {
                    if (selectedGoals.includes(goal.text)) {
                        selectedGoals = selectedGoals.filter(g => g !== goal.text);
                        goalDiv.classList.remove("selected");
                    } else {
                        selectedGoals.push(goal.text);
                        goalDiv.classList.add("selected");
                    }
                });
                goalsGrid.appendChild(goalDiv);
            });
        }

        function setProfileImage(src) {
            if (src && src.trim() !== "") {
                avatarImg.src = src;
                avatarImg.style.display = "block";
                avatarPlaceholderDiv.style.display = "none";
                profileImageData = src;
                localStorage.setItem('userProfileImage', src);
            } else {
                avatarImg.style.display = "none";
                avatarPlaceholderDiv.style.display = "flex";
                profileImageData = null;
                localStorage.removeItem('userProfileImage');
            }
        }

        function handleFileUpload() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "image/*";
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        setProfileImage(ev.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function handleUrlImage() {
            const promptMsg = currentLang === "ar" ? "أدخل رابط الصورة (URL)" : "Enter image URL";
            let url = prompt(promptMsg);
            if (url && (url.startsWith("http://") || url.startsWith("https://") || url.startsWith("data:"))) {
                setProfileImage(url);
            } else if (url) {
                alert(currentLang === "ar" ? "يرجى إدخال رابط صحيح" : "Please enter a valid URL");
            }
        }

        function showWelcomeToast(userName) {
            const oldToast = document.querySelector(".welcome-toast");
            if (oldToast) oldToast.remove();

            const dict = langData[currentLang];
            const message = dict.welcomeMsg.replace("{{name}}", userName);
            const toast = document.createElement("div");
            toast.className = "welcome-toast";
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = "0";
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function handleSubmit() {
            let name = fullNameInput.value.trim();
            const age = ageInput.value.trim();
            const dict = langData[currentLang];

            if (!name) {
                alert(currentLang === "ar" ? "الرجاء إدخال الاسم" : "Please enter your name");
                return;
            }
            if (!age || isNaN(age) || parseInt(age) <= 0 || parseInt(age) > 120) {
                alert(currentLang === "ar" ? "الرجاء إدخال عمر صحيح (1-120)" : "Please enter a valid age (1-120)");
                return;
            }
            if (selectedGoals.length === 0) {
                alert(dict.selectGoalHint);
                return;
            }

            if (profileImageData) {
                localStorage.setItem('userProfileImage', profileImageData);
            }

            const userProfile = {
                name: name,
                age: parseInt(age),
                goals: selectedGoals,
                profileImage: profileImageData || null,
                language: currentLang,
                onboarded: true
            };
            localStorage.setItem("userProfile", JSON.stringify(userProfile));

            showWelcomeToast(name);

            setTimeout(() => {
                window.location.href = "index .html";
            }, 1500);
        }

        document.getElementById("uploadBtn").addEventListener("click", handleFileUpload);
        document.getElementById("urlBtn").addEventListener("click", handleUrlImage);
        document.getElementById("submitBtn").addEventListener("click", handleSubmit);

        document.querySelectorAll(".lang-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentLang = btn.dataset.lang;
                applyLanguage();
            });
        });

        selectedGoals = [];
        applyLanguage();
        avatarPlaceholderDiv.style.display = "flex";
        avatarImg.style.display = "none";
    </script>
</body>
</html>
